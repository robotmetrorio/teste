<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RôBot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden; /* remove rolagem geral */
    }

    .fundo {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: url('site.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .conteudo {
      border: 3px solid #00f0ff;
      border-radius: 20px;
      width: 100%;
      max-width: 900px;
      height: 500px; /* altura fixa para o retângulo */
      padding: 0;
      overflow: hidden;
      background-color: transparent !important;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
      background: transparent !important;
    }

    @media (max-width: 768px) {
      .conteudo {
        max-width: 95%;
        height: 400px;
      }
    }

    @media (max-width: 480px) {
      .conteudo {
        height: 350px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="fundo">
    <div class="conteudo">
      <iframe src="opcao1.html" name="conteudo" allowtransparency="true"></iframe>
    </div>
  </div>
</body>
</html>
