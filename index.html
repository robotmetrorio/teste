<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RôBot Responsivo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #000;
    }

    .fundo {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('site.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2vh 4vw;
    }

    .conteudo {
      background-color: transparent !important;
      border: 2px solid #00f0ff;
      border-radius: 20px;
      width: 100%;
      max-width: 900px;
      height: 60vh; /* relativo à altura da tela */
      min-height: 350px;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
      background: transparent !important;
    }

    @media (max-width: 1024px) {
      .conteudo {
        height: 65vh;
      }
    }

    @media (max-width: 768px) {
      .conteudo {
        height: 60vh;
        min-height: 320px;
      }
    }

    @media (max-width: 480px) {
      .conteudo {
        height: 55vh;
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="fundo">
    <div class="conteudo">
      <iframe src="opcao1.html" name="conteudo" allowtransparency="true"></iframe>
    </div>
  </div>
</body>
</html>
